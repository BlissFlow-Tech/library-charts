image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent


service:
  main:
    enabled: true
    ports:
      http:
        port: 80

ingress:
  main:
    enabled: true
    ingressClassName: nginx
    hosts:
    - host: user.example.com
      paths:
      - path: /
        pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  target:  common-test
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
#  externalMetrics:
#  - name: queue_length
#    target:
#      type: Value
#      value: "5"
#    selector:
#      component: test-queue

external-secrets:
  - name: example-secret
    secretStoreRef:
      name: my-secret-store
      kind: ClusterSecretStore
    target:
      name: my-k8s-secret
    data:
      - secretKey: username
        remoteRef:
          key: prod/db-credentials
          property: username
      - secretKey: password
        remoteRef:
          key: prod/db-credentials
          property: password
    dataFrom:
      - extract:
          key: shared/secrets
